<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Return Request</title>

<style>
body {
  font-family:'Segoe UI';
  margin:0;
  background:#f4f6fb;
  text-align:center;
}

.header {
  background:#2d3e50;
  color:#fff;
  padding:18px;
  font-size:22px;
  font-weight:bold;
}

/* SEARCH */
.search-box {
  margin:15px;
}

input {
  width:85%;
  max-width:350px;
  padding:12px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ccc;
  outline:none;
}

/* CARD LIST */
.list {
  padding:10px;
}

.card {
  background:#fff;
  margin:10px auto;
  padding:12px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  text-align:left;
  max-width:400px;
}

.row {
  font-size:14px;
  margin:3px 0;
}

.title {
  font-weight:bold;
  font-size:16px;
  color:#2d3e50;
}

.tag {
  display:inline-block;
  padding:3px 8px;
  border-radius:6px;
  font-size:12px;
  color:#fff;
}

.green { background:#4CAF50; }
.orange { background:#FF9800; }
.blue { background:#2196F3; }

.no-data {
  margin-top:30px;
  color:#888;
}

</style>
</head>

<body>

<div class="header">Return Request</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search Order ID / Mobile">
</div>

<div class="list" id="list"></div>

<script>

const API_URL = "YOUR_GOOGLE_SCRIPT_URL";

let fullData = [];

/* ================= LOAD ================= */
function loadData(){
fetch(API_URL+"?type=exchange")
.then(res=>res.json())
.then(data=>{
  fullData = data.reverse();
  render(fullData);
});
}

/* ================= RENDER ================= */
function render(data){

let container = document.getElementById("list");
container.innerHTML="";

if(data.length === 0){
  container.innerHTML = `<div class="no-data">No Data Found</div>`;
  return;
}

data.forEach(r=>{

let statusColor = r.exchange === "Yes" ? "green" : "orange";

let card = document.createElement("div");
card.className="card";

card.innerHTML = `
<div class="title">${r.name || "-"}</div>

<div class="row">📦 Order: ${r.order_id}</div>
<div class="row">📱 Mobile: ${r.mobile}</div>
<div class="row">📅 Date: ${r.date}</div>

<div class="row">
<span class="tag ${statusColor}">
${r.exchange || "Pending"}
</span>
</div>

<div class="row">🔁 Return: ${r.return_product}</div>
<div class="row">🔄 Exchange: ${r.exchange_product}</div>

<div class="row">💬 ${r.description || "-"}</div>
`;

container.appendChild(card);

});

}

/* ================= LIVE SEARCH ================= */
searchInput.addEventListener("input", ()=>{

let val = searchInput.value.toLowerCase().trim();

if(!val){
  render(fullData);
  return;
}

let filtered = fullData.filter(r =>
  String(r.order_id).toLowerCase().includes(val) ||
  String(r.mobile).toLowerCase().includes(val)
);

render(filtered);

});

/* ================= INIT ================= */
loadData();

</script>

</body>
</html>
