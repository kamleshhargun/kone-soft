<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Return Request Search</title>

<style>
body {
  font-family:'Segoe UI';
  margin:0;
  background:#f4f6fb;
  text-align:center;
}

.header {
  background:#2d3e50;
  color:#fff;
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

.search-box {
  margin:20px;
}

input {
  width:260px;
  padding:12px;
  font-size:16px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  padding:12px 15px;
  border:none;
  background:#2d3e50;
  color:#fff;
  border-radius:8px;
  margin-left:5px;
  cursor:pointer;
}

table {
  width:95%;
  margin:20px auto;
  border-collapse:collapse;
  background:#fff;
}

th, td {
  padding:8px;
  border:1px solid #ccc;
  font-size:13px;
}

th {
  background:#2d3e50;
  color:#fff;
}

tr:hover {
  background:#f1f3f9;
}
</style>
</head>

<body>

<div class="header">Return Request</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Enter Order ID / Mobile">
  <button onclick="searchData()">Search</button>
  <button onclick="loadData()">Reset</button>
</div>

<table id="dataTable">
<thead>
<tr>
<th>Date</th>
<th>Request ID</th>
<th>Name</th>
<th>Order ID</th>
<th>Mobile</th>
<th>Email</th>
<th>Return</th>
<th>Exchange</th>
<th>UPI/Bank</th>
<th>Return Product</th>
<th>Exchange Product</th>
<th>Description</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const API_URL = "YOUR_GOOGLE_SCRIPT_URL";

let fullData = [];

/* ================= LOAD ALL DATA ================= */
function loadData(){
fetch(API_URL+"?type=exchange")
.then(res=>res.json())
.then(data=>{
  fullData = data;
  renderTable(data);
});
}

/* ================= RENDER ================= */
function renderTable(data){
let tbody = document.querySelector("#dataTable tbody");
tbody.innerHTML="";

data.reverse().forEach(row=>{

let tr = document.createElement("tr");

tr.innerHTML = `
<td>${row.date}</td>
<td>${row.request_id}</td>
<td>${row.name}</td>
<td>${row.order_id}</td>
<td>${row.mobile}</td>
<td>${row.email}</td>
<td>${row.return}</td>
<td>${row.exchange}</td>
<td>${row.upi_bank}</td>
<td>${row.return_product}</td>
<td>${row.exchange_product}</td>
<td>${row.description}</td>
`;

tbody.appendChild(tr);

});
}

/* ================= SEARCH ================= */
function searchData(){

let val = searchInput.value.toLowerCase().trim();

if(!val){
  renderTable(fullData);
  return;
}

let filtered = fullData.filter(r =>
  String(r.order_id).toLowerCase().includes(val) ||
  String(r.mobile).toLowerCase().includes(val)
);

renderTable(filtered);

}

/* ENTER KEY SEARCH */
searchInput.addEventListener("keypress",e=>{
if(e.key==="Enter") searchData();
});

/* AUTO LOAD */
loadData();

</script>

</body>
</html>
