<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Return Request</title>

<style>
body { font-family:'Segoe UI'; margin:0; background:#f4f6fb; text-align:center; }

.header {
  background:#2d3e50;
  color:#fff;
  padding:18px;
  font-size:22px;
  font-weight:bold;
}

.search-box { margin:15px; }

input {
  width:220px;
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  padding:10px 12px;
  margin:5px;
  border:none;
  border-radius:6px;
  background:#2d3e50;
  color:#fff;
  cursor:pointer;
}

table {
  width:98%;
  margin:auto;
  border-collapse:collapse;
  background:#fff;
  display:none;
}

th, td {
  border:1px solid #ccc;
  padding:6px;
  font-size:12px;
}

th {
  background:#2d3e50;
  color:#fff;
}

.pagination { margin:15px; }

.page-btn {
  padding:6px 10px;
  margin:3px;
  border:none;
  background:#2196F3;
  color:#fff;
  cursor:pointer;
}

.no-data {
  margin-top:20px;
  color:red;
  font-weight:bold;
}

#statusBox {
  margin:10px;
  font-weight:bold;
  padding:8px;
  border-radius:6px;
  display:none;
}
</style>
</head>

<body>

<div class="header">Return Request</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Order ID / Mobile">

<button onclick="searchData()">Search</button>
<button onclick="clearSearch()">Clear</button>
<button onclick="loadData()">Load Data</button>
<button onclick="goBack()">Back</button>
</div>

<div id="statusBox"></div>

<table id="dataTable">
<thead>
<tr>
<th>Date</th>
<th>Request ID</th>
<th>Name</th>
<th>Order ID</th>
<th>Mobile</th>
<th>Email</th>
<th>Return</th>
<th>Exchange</th>
<th>UPI/Bank</th>
<th>Return Product</th>
<th>Exchange Product</th>
<th>Description</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="no-data" id="noDataMsg"></div>
<div class="pagination" id="pagination"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxnW9V63PUjacF2w-9tVAsaOb6vMrf6XuMowfttVTp_iVpgHgndNVgWueCKvcwV12FB/exec"; // 🔥 change karo

let fullData = [];
let filteredData = [];
let currentPage = 1;
const rowsPerPage = 25;

/* STATUS */
function showStatus(message, color){
  let box = document.getElementById("statusBox");
  box.style.display = "block";
  box.style.background = color;
  box.style.color = "#fff";
  box.innerText = message;
}

/* LOAD DATA */
function loadData(){

  showStatus("🔄 Loading data...", "#2196F3");

  fetch(API_URL, {
    method: "GET",
    mode: "cors"
  })
  .then(response => response.text()) // 👈 IMPORTANT CHANGE
  .then(text => {

    console.log("RAW:", text);

    let data;

    try {
      data = JSON.parse(text); // 👈 manually parse
    } catch(e){
      throw new Error("JSON Parse Error");
    }

    if(!data || data.length === 0){
      showStatus("⚠️ No Data Found", "#ff9800");
      return;
    }

    showStatus("✅ Data Loaded (" + data.length + " records)", "#4CAF50");

    fullData = data.reverse();
    filteredData = [...fullData];
    currentPage = 1;

    renderTable();

  })
  .catch(err=>{
    console.error(err);
    showStatus("❌ " + err.message, "#f44336");
  });

}
/* TABLE */
function renderTable(){

  let tbody = document.getElementById("tableBody");
  let table = document.getElementById("dataTable");
  let msg = document.getElementById("noDataMsg");

  tbody.innerHTML = "";

  if(filteredData.length === 0){
    table.style.display = "none";
    msg.innerText = "No Data Found";
    return;
  }

  table.style.display = "table";
  msg.innerText = "";

  let start = (currentPage - 1) * rowsPerPage;
  let end = start + rowsPerPage;

  let pageData = filteredData.slice(start, end);

  let html = "";

  pageData.forEach(item => {

    html += `
      <tr>
        <td>${item.date ? new Date(item.date).toLocaleString() : ""}</td>
        <td>${item.request_id || ""}</td>
        <td>${item.name || ""}</td>
        <td>${item.order_id || ""}</td>
        <td>${item.mobile || ""}</td>
        <td>${item.email || ""}</td>
        <td>${item.return || ""}</td>
        <td>${item.exchange || ""}</td>
        <td>${item.upi_bank || ""}</td>
        <td>${item.return_product || ""}</td>
        <td>${item.exchange_product || ""}</td>
        <td>${item.description || ""}</td>
      </tr>
    `;

  });

  tbody.innerHTML = html;

  renderPagination();
}

/* PAGINATION */
function renderPagination(){

let pageCount = Math.ceil(filteredData.length / rowsPerPage);
let container = document.getElementById("pagination");

container.innerHTML="";

for(let i=1;i<=pageCount;i++){
let btn = document.createElement("button");
btn.innerText = i;
btn.className = "page-btn";

btn.onclick = ()=>{
  currentPage = i;
  renderTable();
};

container.appendChild(btn);
}

}

/* SEARCH */
function searchData(){

let val = document.getElementById("searchInput").value.toLowerCase().trim();

if(!val){
  filteredData = [...fullData];
} else {
  filteredData = fullData.filter(r =>
    String(r.order_id || "").toLowerCase().includes(val) ||
    String(r.mobile || "").toLowerCase().includes(val)
  );
}

currentPage = 1;
renderTable();

showStatus("🔍 Found: " + filteredData.length + " records", "#673ab7");

}

/* CLEAR */
function clearSearch(){
document.getElementById("searchInput").value="";
filteredData = [...fullData];
currentPage = 1;
renderTable();
showStatus("🔄 Data Reset", "#607d8b");
}

/* BACK */
function goBack(){
window.location.href="index.html";
}

/* AUTO LOAD */
loadData();

</script>

</body>
</html>
