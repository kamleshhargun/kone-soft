<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Return Request</title>

<style>
body { font-family:'Segoe UI'; margin:0; background:#f4f6fb; text-align:center; }

.header {
  background:#2d3e50;
  color:#fff;
  padding:18px;
  font-size:22px;
  font-weight:bold;
}

/* SEARCH */
.search-box { margin:15px; }

input {
  width:220px;
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  padding:10px 12px;
  margin:5px;
  border:none;
  border-radius:6px;
  background:#2d3e50;
  color:#fff;
  cursor:pointer;
}

/* TABLE */
table {
  width:98%;
  margin:auto;
  border-collapse:collapse;
  background:#fff;
}

th, td {
  border:1px solid #ccc;
  padding:6px;
  font-size:12px;
}

th {
  background:#2d3e50;
  color:#fff;
}

/* PAGINATION */
.pagination {
  margin:15px;
}

.page-btn {
  padding:6px 10px;
  margin:3px;
  border:none;
  background:#2196F3;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">Return Request</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Order ID / Mobile">

<button onclick="searchData()">Search</button>
<button onclick="clearSearch()">Clear</button>
<button onclick="loadData()">Load Data</button>
<button onclick="goBack()">Back</button>
</div>

<table>
<thead>
<tr>
<th>Date</th>
<th>Request ID</th>
<th>Name</th>
<th>Order ID</th>
<th>Mobile</th>
<th>Email</th>
<th>Return</th>
<th>Exchange</th>
<th>UPI/Bank</th>
<th>Return Product</th>
<th>Exchange Product</th>
<th>Description</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="pagination" id="pagination"></div>

<script>

const API_URL = "YOUR_GOOGLE_SCRIPT_URL";

let fullData = [];
let filteredData = [];
let currentPage = 1;
const rowsPerPage = 25;

/* LOAD DATA */
function loadData(){
fetch(API_URL+"?type=exchange")
.then(res=>res.json())
.then(data=>{
  fullData = data.reverse(); // latest first
  filteredData = [...fullData];
  currentPage = 1;
  renderTable();
});
}

/* RENDER TABLE */
function renderTable(){

let tbody = document.getElementById("tableBody");
tbody.innerHTML="";

let start = (currentPage-1)*rowsPerPage;
let end = start + rowsPerPage;

let pageData = filteredData.slice(start,end);

pageData.forEach(r=>{

let tr = document.createElement("tr");

tr.innerHTML = `
<td>${r.date}</td>
<td>${r.request_id}</td>
<td>${r.name}</td>
<td>${r.order_id}</td>
<td>${r.mobile}</td>
<td>${r.email}</td>
<td>${r.return}</td>
<td>${r.exchange}</td>
<td>${r.upi_bank}</td>
<td>${r.return_product}</td>
<td>${r.exchange_product}</td>
<td>${r.description}</td>
`;

tbody.appendChild(tr);

});

renderPagination();

}

/* PAGINATION */
function renderPagination(){

let pageCount = Math.ceil(filteredData.length / rowsPerPage);
let container = document.getElementById("pagination");

container.innerHTML="";

for(let i=1;i<=pageCount;i++){
let btn = document.createElement("button");
btn.innerText = i;
btn.className = "page-btn";

btn.onclick = ()=>{
  currentPage = i;
  renderTable();
};

container.appendChild(btn);
}

}

/* SEARCH */
function searchData(){

let val = searchInput.value.toLowerCase().trim();

if(!val){
  filteredData = [...fullData];
} else {
  filteredData = fullData.filter(r =>
    String(r.order_id).toLowerCase().includes(val) ||
    String(r.mobile).toLowerCase().includes(val)
  );
}

currentPage = 1;
renderTable();

}

/* CLEAR */
function clearSearch(){
searchInput.value="";
filteredData = [...fullData];
currentPage = 1;
renderTable();
}

/* BACK */
function goBack(){
window.location.href="index.html";
}

/* AUTO LOAD */
loadData();

</script>

</body>
</html>
