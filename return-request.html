<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Return Request</title>

<style>
body { font-family:'Segoe UI'; margin:0; background:#f4f6fb; }

.header {
  background:#2d3e50;
  color:#fff;
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

/* SEARCH */
.search-box {
  text-align:center;
  margin:15px;
}

input {
  width:85%;
  max-width:350px;
  padding:12px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* CARD */
.list { padding:10px; }

.card {
  background:#fff;
  margin:10px auto;
  padding:12px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  max-width:400px;
}

.row { font-size:14px; margin:4px 0; }

.title {
  font-weight:bold;
  font-size:16px;
  color:#2d3e50;
}

/* STATUS */
.tag {
  padding:4px 10px;
  border-radius:6px;
  font-size:12px;
  color:#fff;
}

.green { background:#4CAF50; }
.orange { background:#FF9800; }

/* BUTTONS */
.btns { margin-top:8px; }

.btn {
  padding:6px 10px;
  margin:3px;
  border:none;
  border-radius:6px;
  color:#fff;
  font-size:12px;
  cursor:pointer;
}

.pickup { background:#2196F3; }
.exchange { background:#9C27B0; }
.complete { background:#4CAF50; }

.no-data {
  text-align:center;
  margin-top:30px;
  color:#888;
}
</style>
</head>

<body>

<div class="header">Return Request</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search Order ID / Mobile">
</div>

<div class="list" id="list"></div>

<script>

const API_URL = "YOUR_GOOGLE_SCRIPT_URL";

let fullData = [];

/* LOAD DATA */
function loadData(){
fetch(API_URL+"?type=exchange")
.then(res=>res.json())
.then(data=>{
  fullData = data.reverse();
  render(fullData);
});
}

/* RENDER */
function render(data){

let container = document.getElementById("list");
container.innerHTML="";

if(data.length === 0){
  container.innerHTML = `<div class="no-data">No Data Found</div>`;
  return;
}

data.forEach(r=>{

let statusColor = r.description === "Completed" ? "green" : "orange";
let statusText = r.description === "Completed" ? "Completed" : "Pending";

let card = document.createElement("div");
card.className="card";

card.innerHTML = `
<div class="title">${r.name || "-"}</div>

<div class="row">📦 Order: ${r.order_id}</div>
<div class="row">📱 Mobile: ${r.mobile}</div>
<div class="row">📅 Date: ${r.date}</div>

<div class="row">
<span class="tag ${statusColor}">${statusText}</span>
</div>

<div class="row">🔁 Return: ${r.return_product}</div>
<div class="row">🔄 Exchange: ${r.exchange_product}</div>

<div class="btns">
<button class="btn pickup" onclick="update('${r.order_id}','pickup')">Pickup</button>
<button class="btn exchange" onclick="update('${r.order_id}','exchange')">Exchange</button>
<button class="btn complete" onclick="complete('${r.order_id}')">Complete</button>
</div>
`;

container.appendChild(card);

});

}

/* UPDATE */
function update(orderId, field){

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"updateExchange",
order_id:orderId,
field:field
})
})
.then(res=>res.json())
.then(()=>{
loadData();
});

}

/* COMPLETE */
function complete(orderId){

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"completeExchange",
order_id:orderId
})
})
.then(res=>res.json())
.then(()=>{
loadData();
});

}

/* SEARCH */
searchInput.addEventListener("input", ()=>{

let val = searchInput.value.toLowerCase().trim();

if(!val){
  render(fullData);
  return;
}

let filtered = fullData.filter(r =>
  String(r.order_id).toLowerCase().includes(val) ||
  String(r.mobile).toLowerCase().includes(val)
);

render(filtered);

});

/* INIT */
loadData();

</script>

</body>
</html>
