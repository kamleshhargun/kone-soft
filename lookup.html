<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Lookup</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',Arial;
  background:linear-gradient(135deg,#0f2f2f,#0b1f1f);
  color:#fff;
  text-align:center;
}

/* HEADER */
.header{
  padding:25px;
  font-size:26px;
  font-weight:bold;
}

/* SEARCH BOX */
.search-box{
  margin-top:20px;
}

/* INPUT */
input{
  padding:12px;
  width:260px;
  border-radius:10px;
  border:none;
  outline:none;
}

/* BUTTON (GREEN STYLE) */
button{
  background:#2ec48d;
  color:#0b1f1f;
  border:none;
  border-radius:10px;
  padding:10px 15px;
  cursor:pointer;
  font-weight:bold;
  margin:5px;
  transition:0.3s;
}

button:hover{
  transform:translateY(-3px);
}

/* TABLE */
table{
  margin:30px auto;
  border-collapse:collapse;
  width:95%;
  background:#ffffff;
  color:#000;
  border-radius:10px;
  overflow:hidden;
}

th{
  background:#2ec48d;
  color:#0b1f1f;
}

th,td{
  padding:12px;
  border:1px solid #ddd;
}

/* TOTAL */
.total-row{
  background:#e8f5e9;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="header">Order Lookup</div>

<div class="search-box">
  <input type="text" id="orderId" placeholder="Enter Order ID">
  <br>
  <button onclick="searchOrder()">Search</button>
  <button onclick="clearTable()">Clear</button>
  <button onclick="goBack()">Back</button>
</div>

<table>
<thead>
<tr>
<th>Order ID</th>
<th>SKU</th>
<th>Product</th>
<th>Qty</th>
</tr>
</thead>

<tbody id="tableData">
<tr><td colspan="4">Enter Order ID to search</td></tr>
</tbody>
</table>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxnW9V63PUjacF2w-9tVAsaOb6vMrf6XuMowfttVTp_iVpgHgndNVgWueCKvcwV12FB/exec";

/* SEARCH */
function searchOrder(){

let id=document.getElementById("orderId").value.trim();

if(!id){
alert("Enter Order ID ❗");
return;
}

tableData.innerHTML="<tr><td colspan='4'>Loading...</td></tr>";

fetch(API_URL+"?type=lookup&order_id="+encodeURIComponent(id))
.then(res=>res.json())
.then(data=>{

let html="";
let totalQty=0;

if(!data || data.length===0){
html="<tr><td colspan='4'>No Data Found ❌</td></tr>";
}else{

data.forEach(item=>{

totalQty+=Number(item.qty)||0;

html+=`<tr>
<td>${item.order_id}</td>
<td>${item.sku}</td>
<td>${item.product}</td>
<td>${item.qty}</td>
</tr>`;
});

html+=`<tr class="total-row">
<td colspan="3">Total Qty</td>
<td>${totalQty}</td>
</tr>`;
}

tableData.innerHTML=html;

})
.catch(()=>{
tableData.innerHTML="<tr><td colspan='4'>Error ❌</td></tr>";
});

}

/* CLEAR */
function clearTable(){
orderId.value="";
tableData.innerHTML="<tr><td colspan='4'>Enter Order ID to search</td></tr>";
}

/* ENTER */
orderId.addEventListener("keypress",function(e){
if(e.key==="Enter"){
searchOrder();
}
});

/* BACK */
function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>
