<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cutting</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family:'Segoe UI'; margin:0; background:#f4f6fb; text-align:center; }
.header { background:#2d3e50; color:#fff; padding:20px; font-size:26px; font-weight:bold; }
.container { display:flex; justify-content:center; gap:20px; flex-wrap:wrap; padding:30px; }
.box {
  width:220px; height:220px; background:#fff; border-radius:12px;
  display:flex; justify-content:center; align-items:center;
  cursor:pointer; font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.scan-area { display:none; margin-top:30px; }
input { width:250px; padding:10px; margin:10px; font-size:16px; }
#msg { margin-top:15px; font-weight:bold; color:green; }
#reader { width:300px; margin:auto; }
</style>
</head>

<body>

<div class="header">Cutting</div>

<div class="container">
  <div class="box" onclick="openScanner()">Scan by Scanner</div>
  <div class="box" onclick="openCamera()">Scan by Camera</div>
  <div class="box" onclick="openManual()">Manual</div>
  <div class="box" onclick="goBack()">Back</div>
</div>

<div class="scan-area" id="scanArea">
  <input type="text" id="orderId" placeholder="Scan Order ID">
  <input type="text" id="tracking" placeholder="Scan Tracking">
  <div id="msg"></div>
</div>

<div id="reader"></div>

<script>
const API_URL = "YOUR_GOOGLE_SCRIPT_URL";

function resetFields(){
  orderId.value=""; tracking.value=""; msg.innerText="";
  orderId.focus();
}

function sendData(){
  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      mode:"cutting",
      order_id:orderId.value,
      tracking:tracking.value
    })
  })
  .then(r=>r.json())
  .then(()=>{
    msg.innerText="Completed ✅";
    resetFields();
  });
}

function openScanner(){
  scanArea.style.display="block";
  reader.innerHTML="";
  resetFields();
}

function openManual(){
  scanArea.style.display="block";
  reader.innerHTML="";
  resetFields();
}

let html5Qr;
function openCamera(){
  scanArea.style.display="block";
  resetFields();

  html5Qr=new Html5Qrcode("reader");
  html5Qr.start({facingMode:"environment"},{fps:10,qrbox:250},
    (txt)=>{
      if(!orderId.value){ orderId.value=txt; }
      else{
        tracking.value=txt;
        sendData();
        html5Qr.stop();
      }
    }
  );
}

orderId.addEventListener("keypress",e=>{
  if(e.key==="Enter") tracking.focus();
});

tracking.addEventListener("keypress",e=>{
  if(e.key==="Enter") sendData();
});

function goBack(){
  window.location.href="dashboard.html";
}
</script>

</body>
</html>
