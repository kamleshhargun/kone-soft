<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Lookup</title>

<style>
body {
  font-family:'Segoe UI', Arial;
  margin:0;
  background:#f4f6fb;
  text-align:center;
}

.header {
  background:#2d3e50;
  color:#fff;
  padding:20px;
  font-size:26px;
  font-weight:bold;
}

.search-box {
  margin-top:30px;
}

input {
  padding:12px;
  width:260px;
  font-size:16px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  padding:12px 18px;
  font-size:15px;
  border:none;
  border-radius:8px;
  background:#2d3e50;
  color:white;
  cursor:pointer;
}

button:hover {
  background:#1b2838;
}

table {
  margin:30px auto;
  border-collapse:collapse;
  width:90%;
  background:#fff;
}

th, td {
  padding:12px;
  border:1px solid #ddd;
}

th {
  background:#2d3e50;
  color:white;
}

.back {
  margin:20px;
  padding:10px 20px;
  background:#555;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">Order Lookup</div>

<div class="search-box">
  <input type="text" id="orderId" placeholder="Enter Order ID">
  <button onclick="searchOrder()">Search</button>
</div>

<table>
<thead>
<tr>
<th>SKU</th>
<th>Product</th>
<th>Qty</th>
</tr>
</thead>

<tbody id="tableData">
<tr><td colspan="3">Enter Order ID to search</td></tr>
</tbody>
</table>

<div class="back" onclick="goBack()">⬅ Back</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxpHx77yM2aeGi6k-q8CwJA3YI1znrGbzzf3SjKrNhFK8eG5RxoEPHAKiFvsNq3L0s4/exec";

/* SEARCH FUNCTION */
function searchOrder(){

  let raw = document.getElementById("orderId").value;

  // 🔥 CLEAN INPUT (IMPORTANT)
  let id = String(raw).trim();

  if(!id){
    alert("Enter Order ID ❗");
    return;
  }

  document.getElementById("tableData").innerHTML =
    "<tr><td colspan='3'>Loading...</td></tr>";

  fetch(API_URL + "?type=lookup&order_id=" + encodeURIComponent(id))
  .then(res => res.json())
  .then(data => {

    console.log("API Response:", data);

    let html = "";

    if(!data || data.length === 0){
      html = "<tr><td colspan='3'>No Data Found ❌</td></tr>";
    } else {

      data.forEach(item => {
        html += `<tr>
          <td>${item.sku ?? "-"}</td>
          <td>${item.product ?? "-"}</td>
          <td>${item.qty ?? "-"}</td>
        </tr>`;
      });

    }

    document.getElementById("tableData").innerHTML = html;

  })
  .catch(err => {
    console.error(err);
    document.getElementById("tableData").innerHTML =
      "<tr><td colspan='3'>Error ❌</td></tr>";
  });

}

/* ENTER KEY SUPPORT */
document.getElementById("orderId").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    searchOrder();
  }
});

/* BACK */
function goBack(){
  window.location.href = "dashboard.html";
}

</script>

</body>
</html>
