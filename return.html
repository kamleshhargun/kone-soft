<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Return</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family:'Segoe UI'; margin:0; background:#f4f6fb; text-align:center; }

.header {
  background:#2d3e50;
  color:#fff;
  padding:20px;
  font-size:26px;
  font-weight:bold;
}

.container {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  padding:30px;
}

.box {
  width:220px;
  height:220px;
  background:#fff;
  border-radius:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.scan-area { display:none; margin-top:30px; }

input {
  width:260px;
  padding:12px;
  margin:10px;
  font-size:16px;
}

/* MESSAGE */
#msg {
  margin-top:15px;
  font-weight:bold;
  font-size:18px;
}

/* SUCCESS ANIMATION */
.success {
  animation: pop 0.4s ease;
}

@keyframes pop {
  0% { transform:scale(0.7); opacity:0; }
  100% { transform:scale(1); opacity:1; }
}

#reader { width:300px; margin:auto; }
</style>
</head>

<body>

<div class="header">Order Return</div>

<div class="container">
  <div class="box" onclick="openScanner()">Scan by Scanner</div>
  <div class="box" onclick="openCamera()">Scan by Camera</div>
  <div class="box" onclick="openManual()">Manual</div>
  <div class="box" onclick="goBack()">Back</div>
</div>

<div class="scan-area" id="scanArea">
  <input type="text" id="orderId" placeholder="Scan Order ID">
  <br>
  <input type="text" id="tracking" placeholder="Scan Tracking">
  <div id="msg"></div>
</div>

<div id="reader"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxpHx77yM2aeGi6k-q8CwJA3YI1znrGbzzf3SjKrNhFK8eG5RxoEPHAKiFvsNq3L0s4/exec";

/* RESET */
function resetFields(){
  orderId.value="";
  tracking.value="";
  orderId.focus();
}

/* 🔊 BEEP */
function playBeep(){
  let audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
  audio.play();
}

/* ✅ SEND DATA (FAST UI) */
function sendData(){

  if(!orderId.value || !tracking.value){
    msg.style.color="red";
    msg.innerText="Missing Data ❌";
    return;
  }

  // ⚡ Instant Success
  msg.style.color="green";
  msg.classList.add("success");
  msg.innerText="Completed ✅";

  // 🔊 + 📳
  playBeep();
  if(navigator.vibrate) navigator.vibrate(200);

  // Background API
  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      mode:"Return",
      order_id:orderId.value,
      tracking:tracking.value
    })
  }).catch(()=>{
    msg.style.color="red";
    msg.innerText="Server Error ❌";
  });

  setTimeout(()=>{
    msg.innerText="";
    msg.classList.remove("success");
  },1500);

  resetFields();
}

/* MODES */
function openScanner(){
  scanArea.style.display="block";
  reader.innerHTML="";
  resetFields();
}

function openManual(){
  scanArea.style.display="block";
  reader.innerHTML="";
  resetFields();
}

/* CAMERA */
let html5Qr;

function openCamera(){
  scanArea.style.display="block";
  resetFields();

  html5Qr = new Html5Qrcode("reader");

  html5Qr.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    (text)=>{

      if(!orderId.value){
        orderId.value=text;
      }
      else if(!tracking.value){
        tracking.value=text;

        playBeep();
        if(navigator.vibrate) navigator.vibrate(200);

        sendData();
        html5Qr.stop();
      }

    }
  );
}

/* FLOW */
orderId.addEventListener("keypress",e=>{
  if(e.key==="Enter") tracking.focus();
});

tracking.addEventListener("keypress",e=>{
  if(e.key==="Enter") sendData();
});

/* BACK */
function goBack(){
  window.location.href="index.html";
}

</script>

</body>
</html>
