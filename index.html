<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  transition:0.3s;
}

/* LIGHT MODE */
.light{
  background:#f4f6fb;
  color:#000;
}

/* HEADER */
.header{
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

.light .header{
  background:#ffffff;
}

.header span{
  font-size:26px;
  font-weight:bold;
}

.logo{
  position:absolute;
  left:20px;
  width:110px;
  cursor:pointer;
}

/* DASHBOARD */
.dashboard{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  padding:30px;
}

/* CARD */
.card{
  width:260px;
  min-height:220px;
  border-radius:18px;
  padding:18px;
  cursor:pointer;

  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border:1px solid rgba(255,255,255,0.1);

  transition:0.3s;
}

.light .card{
  background:#fff;
  border:1px solid #ddd;
}

.card:hover{
  transform:translateY(-8px) scale(1.03);
}

/* STATS */
.stats{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.stat{
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
}

.light .stat{
  background:#f1f3f9;
}

.stat span{
  display:block;
  font-size:20px;
  font-weight:bold;
}

.today{border-left:5px solid #4CAF50;}
.yesterday{border-left:5px solid #FF9800;}
.total{border-left:5px solid #2196F3;}

/* SIMPLE CENTER TEXT CARD */
.center-text{
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
  <img src="https://raw.githubusercontent.com/kamleshhargun/kone-soft/main/logo.png" class="logo" onclick="location.reload()">
  <span>Harsidhi Ventures</span>
</div>

<div class="dashboard">

<!-- PICKUP -->
<div class="card" onclick="openPage('pickup.html')">
<h3>Pickup</h3>
<div class="stats">
<div class="stat today">Today <span id="pickup_today">0</span></div>
<div class="stat yesterday">Yesterday <span id="pickup_yesterday">0</span></div>
<div class="stat total">Total <span id="pickup_total">0</span></div>
</div>
</div>

<!-- RETURN -->
<div class="card" onclick="openPage('return.html')">
<h3>Return</h3>
<div class="stats">
<div class="stat today">Today <span id="return_today">0</span></div>
<div class="stat yesterday">Yesterday <span id="return_yesterday">0</span></div>
<div class="stat total">Total <span id="return_total">0</span></div>
</div>
</div>

<!-- SEARCH -->
<div class="card" onclick="openPage('lookup.html')">
<h3>Search</h3>
<div class="stats">
<div class="stat total">Orders <span id="lookup_total">0</span></div>
</div>
</div>

<!-- RETURN REQUEST -->
<div class="card" onclick="openPage('return-request.html')">
<h3>Return Request</h3>
<div class="stats">
<div class="stat today">Today <span id="rr_today">0</span></div>
<div class="stat yesterday">Yesterday <span id="rr_yesterday">0</span></div>
<div class="stat total">Total <span id="rr_total">0</span></div>
</div>
</div>

<!-- DATE TIME CARD -->
<div class="card center-text" id="dateTimeCard">
Loading...
</div>

<!-- MODE CARD -->
<div class="card center-text" onclick="toggleMode()" id="modeCard">
Light Mode
</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwcGDOif5DlXDKRuxtsSFV1Rl43E_Yfmiq22_LWn6gIWBtzOSkssef4auS7IR0DyEBV/exec";

function openPage(p){ location.href=p; }

/* DASHBOARD */
function loadDashboard(){
fetch(API_URL+"?type=stats")
.then(res=>res.json())
.then(d=>{
pickup_today.innerText=d.todayPickup||0;
pickup_yesterday.innerText=d.yesterdayPickup||0;
pickup_total.innerText=d.totalPickup||0;

return_today.innerText=d.todayReturn||0;
return_yesterday.innerText=d.yesterdayReturn||0;
return_total.innerText=d.totalReturn||0;

lookup_total.innerText=(d.totalPickup||0)+(d.totalReturn||0);
});
}

/* RETURN REQUEST */
function loadReturnRequest(){
fetch(API_URL+"?type=exchange")
.then(res=>res.json())
.then(data=>{
let today=0,yesterday=0,total=data.length;

function getDate(d){
return d.toLocaleDateString("en-CA",{timeZone:"Asia/Kolkata"});
}

let now=new Date();
let yest=new Date(); yest.setDate(now.getDate()-1);

let t1=getDate(now);
let t2=getDate(yest);

data.forEach(r=>{
let d=(r.date||"").trim();
if(d===t1) today++;
if(d===t2) yesterday++;
});

rr_today.innerText=today;
rr_yesterday.innerText=yesterday;
rr_total.innerText=total;

});
}

/* AUTO LOAD */
function loadAll(){
loadDashboard();
loadReturnRequest();
}
loadAll();
setInterval(loadAll,5000);

/* DATE TIME */
setInterval(()=>{
dateTimeCard.innerText=new Date().toLocaleString("en-IN",{timeZone:"Asia/Kolkata"});
},1000);

/* DARK LIGHT MODE */
function toggleMode(){
document.body.classList.toggle("light");

if(document.body.classList.contains("light")){
modeCard.innerText="Dark Mode";
}else{
modeCard.innerText="Light Mode";
}
}

</script>

</body>
</html>
