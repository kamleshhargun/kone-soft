<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KONE-SOFT</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/kamleshhargun/kone-soft/main/logo.png">
<style>
body {
  font-family:'Segoe UI', Arial;
  margin:0;
  background:#eef2f7;
  text-align:center;
  transition:0.3s;
}
.dark { background:#0f172a; color:#fff; }

/* HEADER */
.header {
  background:linear-gradient(90deg,#2d3e50,#4f46e5);
  color:#fff;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}
.header span { font-size:26px; font-weight:bold; letter-spacing:1px; }
.logo { position:absolute; left:15px; width:110px; cursor:pointer; }

/* ANNOUNCEMENT */
.announcement-bar {
  width:100%;
  background:#111827;
  color:#fff;
  padding:8px 0;
  overflow:hidden;
}
.announcement-text {
  display:inline-block;
  white-space:nowrap;
  animation: scrollText 18s linear infinite;
  font-size:14px;
}
@keyframes scrollText {
  0% { transform:translateX(100%); }
  100% { transform:translateX(-100%); }
}

/* DASHBOARD */
.dashboard {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  padding:25px;
}

/* CARD */
.card {
  width:260px;
  min-height:260px;
  background:#fff;
  border-radius:18px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  padding:18px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:0.3s;
  position:relative;
}

.card:hover {
  transform:translateY(-6px) scale(1.02);
  box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

.dark .card { background:#1e293b; }

/* CARD TITLE */
.card h3 {
  margin:0;
  font-size:20px;
  color:#4f46e5;
}

/* STATS */
.stats { display:flex; flex-direction:column; gap:12px; }

.stat {
  background:#f1f5f9;
  padding:10px;
  border-radius:10px;
  font-size:14px;
  transition:0.2s;
}
.stat:hover { transform:scale(1.02); }

.dark .stat { background:#334155; }

.stat span {
  display:block;
  font-weight:bold;
  font-size:20px;
  margin-top:5px;
}

/* COLORS */
.today { border-left:5px solid #22c55e; }
.yesterday { border-left:5px solid #f59e0b; }
.total { border-left:5px solid #3b82f6; }

/* SETTINGS */
.setting-btn {
  background:#4f46e5;
  color:white;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}
.setting-btn:hover { background:#4338ca; }

/* CALCULATOR */
.calc-container {
  display:none;
  position:fixed;
  bottom:20px;
  right:20px;
  width:260px;
  background:#1e293b;
  border-radius:15px;
  padding:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.4);
}
.calc-display {
  width:100%;
  height:50px;
  margin-bottom:10px;
  text-align:right;
  font-size:20px;
}
.calc-buttons {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.calc-buttons button {
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* DATE TIME */
.datetime-box {
  background:#111827;
  color:#fff;
  padding:10px;
  border-radius:10px;
  font-size:14px;
}

/* MOBILE */
@media(max-width:600px){
  .card { width:90%; }
}
</style>
</head>

<body>

<div class="header">
  <img src="https://raw.githubusercontent.com/kamleshhargun/kone-soft/main/logo.png" class="logo" onclick="location.reload()">
  <span>Harsidhi Ventures</span>
</div>

<div class="announcement-bar">
  <div class="announcement-text" id="announcementText">Loading...</div>
</div>

<div class="dashboard">

<!-- PICKUP -->
<div class="card" onclick="openPage('pickup.html')">
<h3>🚚 Pickup</h3>
<div class="stats">
<div class="stat today">Today <span id="pickup_today">0</span></div>
<div class="stat yesterday">Yesterday <span id="pickup_yesterday">0</span></div>
<div class="stat total">Total <span id="pickup_total">0</span></div>
</div>
</div>

<!-- RETURN -->
<div class="card" onclick="openPage('return.html')">
<h3>🔁 Return</h3>
<div class="stats">
<div class="stat today">Today <span id="return_today">0</span></div>
<div class="stat yesterday">Yesterday <span id="return_yesterday">0</span></div>
<div class="stat total">Total <span id="return_total">0</span></div>
</div>
</div>

<!-- LOOKUP -->
<div class="card" onclick="openPage('lookup.html')">
<h3>🔍 Order Lookup</h3>
<div class="stats">
<div class="stat total">Orders <span id="lookup_total">0</span></div>
</div>
</div>

<!-- RETURN REQUEST -->
<div class="card" onclick="openPage('return-request.html')">
<h3>📦 Return Request</h3>
<div class="stats">
<div class="stat today">Today <span id="rr_today">0</span></div>
<div class="stat yesterday">Yesterday <span id="rr_yesterday">0</span></div>
<div class="stat total">Total <span id="rr_total">0</span></div>
</div>
</div>

<!-- SETTINGS -->
<div class="card">
<h3>⚙️ Settings</h3>

<div class="setting-btn" onclick="toggleCalc()">Calculator</div>
<div class="setting-btn" onclick="toggleMode()" id="modeBtn">Dark Mode</div>
<div class="datetime-box" id="dateTime"></div>
<div class="setting-btn" onclick="exportCSV()">Export Data</div>
<div class="setting-btn" onclick="funny()" id="funBtn">Tik</div>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwcGDOif5DlXDKRuxtsSFV1Rl43E_Yfmiq22_LWn6gIWBtzOSkssef4auS7IR0DyEBV/exec";

function openPage(p){ location.href=p; }

/* ORDER LOOKUP */
function loadOrderLookup(){
fetch(API_URL)
.then(res=>res.text())
.then(text=>{
  let data = JSON.parse(text);
  document.getElementById("lookup_total").innerText = data.length;
});
}

/* RETURN REQUEST */
function loadReturnRequest(){
fetch(API_URL)
.then(res=>res.text())
.then(text=>{
  let data = JSON.parse(text);

  let today=0,yesterday=0,total=data.length;
  let now=new Date();
  let yest=new Date(); yest.setDate(now.getDate()-1);

  let t=now.toISOString().split("T")[0];
  let y=yest.toISOString().split("T")[0];

  data.forEach(r=>{
    let d=new Date(r.date).toISOString().split("T")[0];
    if(d===t) today++;
    if(d===y) yesterday++;
  });

  rr_today.innerText=today;
  rr_yesterday.innerText=yesterday;
  rr_total.innerText=total;

  announcementText.innerText =
  `📦 Return Request → Today: ${today} | Yesterday: ${yesterday} | Total: ${total}`;
});
}

loadOrderLookup();
loadReturnRequest();

/* TIME */
setInterval(()=>{
dateTime.innerHTML =
`📅 ${new Date().toLocaleDateString("en-IN")} <br> ⏰ ${new Date().toLocaleTimeString("en-IN")}`;
},1000);

</script>

</body>
</html>
