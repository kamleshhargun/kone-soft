<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
  font-family:'Segoe UI', Arial;
  margin:0;
  background:#f4f6fb;
  text-align:center;
  transition:0.3s;
}

.dark {
  background:#0f172a;
  color:#fff;
}

/* HEADER */
.header {
  background:#2d3e50;
  color:#fff;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.logo {
  position:absolute;
  left:20px;
  width:120px;
  cursor:pointer;
}

.header span {
  font-size:26px;
  font-weight:bold;
}

/* TOTAL */
.total-box {
  margin-top:15px;
  font-size:20px;
  font-weight:bold;
}

/* GRID */
.dashboard {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  padding:30px;
}

/* CARD */
.card {
  width:250px;
  min-height:250px;
  background:#fff;
  border-radius:15px;
  padding:15px;
  cursor:pointer;
  transition:0.3s;
}

.dark .card {
  background:#1e293b;
}

.card:hover {
  transform:translateY(-5px);
}

/* STATS */
.stat {
  background:#f1f3f9;
  padding:10px;
  border-radius:8px;
  margin:6px 0;
}

.dark .stat {
  background:#334155;
}

.stat span {
  font-weight:bold;
  font-size:18px;
}

/* SETTINGS */
.setting-btn {
  background:#2d3e50;
  color:#fff;
  padding:10px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
}

/* POPUP */
.popup {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.dark .popup {
  background:#1e293b;
}

/* CALCULATOR */
.calc input {
  width:200px;
  padding:10px;
  margin:5px;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://raw.githubusercontent.com/kamleshhargun/kone-soft/main/logo.png" class="logo" onclick="location.reload()">
  <span>Harsidhi Ventures</span>
</div>

<div class="total-box">
  Total Orders: <span id="totalOrders">0</span>
</div>

<div class="dashboard">

<!-- PICKUP -->
<div class="card" onclick="openPage('pickup.html')">
<h3>Pickup</h3>
<div class="stat">Today <span id="pickup_today">0</span></div>
<div class="stat">Total <span id="pickup_total">0</span></div>
</div>

<!-- RETURN -->
<div class="card" onclick="openPage('return.html')">
<h3>Return</h3>
<div class="stat">Today <span id="return_today">0</span></div>
<div class="stat">Total <span id="return_total">0</span></div>
</div>

<!-- LOOKUP -->
<div class="card" onclick="openPage('lookup.html')">
<h3>Search</h3>
<div class="stat">Orders <span id="lookup_total">0</span></div>
</div>

<!-- SETTINGS -->
<div class="card">
<h3>Settings</h3>

<div class="setting-btn" onclick="openCalc()">Calculator</div>

<div class="setting-btn" onclick="toggleMode()" id="modeBtn">Dark Mode</div>

<div class="setting-btn" id="dateTime"></div>

<div class="setting-btn" onclick="exportCSV()">Export Data</div>

<div class="setting-btn" onclick="funny()" id="funBtn">Tik</div>

</div>

</div>

<!-- CALCULATOR POPUP -->
<div class="popup" id="calcBox">
<div class="calc">
<input type="text" id="calcInput" placeholder="Enter calculation">
<br>
<button onclick="calculate()">=</button>
</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwcGDOif5DlXDKRuxtsSFV1Rl43E_Yfmiq22_LWn6gIWBtzOSkssef4auS7IR0DyEBV/exec";

/* NAV */
function openPage(p){
  location.href=p;
}

/* LOAD DATA */
function loadDashboard(){
fetch(API_URL+"?type=stats")
.then(res=>res.json())
.then(d=>{

pickup_today.innerText=d.todayPickup;
pickup_total.innerText=d.totalPickup;

return_today.innerText=d.todayReturn;
return_total.innerText=d.totalReturn;

let total=d.totalPickup+d.totalReturn;
totalOrders.innerText=total;
lookup_total.innerText=total;

});
}
loadDashboard();

/* CALCULATOR */
function openCalc(){
calcBox.style.display="block";
}
window.onclick=function(e){
if(e.target==calcBox) calcBox.style.display="none";
}
function calculate(){
calcInput.value=eval(calcInput.value);
}

/* DARK MODE */
function toggleMode(){
document.body.classList.toggle("dark");
modeBtn.innerText=
document.body.classList.contains("dark")
? "Light Mode":"Dark Mode";
}

/* LIVE TIME INDIA */
setInterval(()=>{
let now=new Date();
dateTime.innerText=now.toLocaleString("en-IN",{timeZone:"Asia/Kolkata"});
},1000);

/* EXPORT CSV */
function exportCSV(){
fetch(API_URL+"?type=exchange")
.then(res=>res.json())
.then(data=>{

let csv="Date,OrderID,Name,Desc,Pickup,Exchange,Status\n";

data.forEach(r=>{
csv+=`${r.date},${r.order_id},${r.name},${r.desc},${r.pickup},${r.exchange},${r.status}\n`;
});

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="data.csv";
a.click();

});
}

/* FUNNY BUTTON */
function funny(){
funBtn.innerText= funBtn.innerText==="Tik" ? "Tok" : "Tik";
}

</script>

</body>
</html>
