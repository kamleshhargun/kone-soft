<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body { font-family:'Segoe UI', Arial; margin:0; background:#f4f6fb; text-align:center; transition:0.3s; }
.dark { background:#0f172a; color:#fff; }

.header {
  background:#2d3e50; color:#fff; height:70px;
  display:flex; align-items:center; justify-content:center;
  position:relative;
}

.header span { font-size:26px; font-weight:bold; }

.logo { position:absolute; left:20px; width:120px; cursor:pointer; }

.dashboard {
  display:flex; flex-wrap:wrap; justify-content:center;
  gap:25px; padding:30px;
}

.card {
  width:250px; min-height:250px;
  background:#fff; border-radius:15px;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
  padding:15px; cursor:pointer;
  display:flex; flex-direction:column; justify-content:space-between;
}

.dark .card { background:#1e293b; }

.card:hover { transform:translateY(-5px); background:#eef3ff; }

.stats { display:flex; flex-direction:column; gap:10px; }

.stat { background:#f1f3f9; padding:10px; border-radius:8px; }
.dark .stat { background:#334155; }

.stat span { display:block; font-weight:bold; font-size:18px; }

.today { border-left:5px solid #4CAF50; }
.yesterday { border-left:5px solid #FF9800; }
.total { border-left:5px solid #2196F3; }

.setting-btn {
  background:#2d3e50; color:white;
  padding:10px; margin-top:8px;
  border-radius:8px; cursor:pointer;
}

.popup {
  display:none; position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#fff; padding:20px; border-radius:10px;
}

.dark .popup { background:#1e293b; }

</style>
</head>

<body>

<div class="header">
  <img src="https://raw.githubusercontent.com/kamleshhargun/kone-soft/main/logo.png" class="logo" onclick="location.reload()">
  <span>Harsidhi Ventures</span>
</div>

<div class="dashboard">

<!-- PICKUP -->
<div class="card" onclick="openPage('pickup.html')">
<h3>Pickup</h3>
<div class="stats">
<div class="stat today">Today <span id="pickup_today">0</span></div>
<div class="stat yesterday">Yesterday <span id="pickup_yesterday">0</span></div>
<div class="stat total">Total <span id="pickup_total">0</span></div>
</div>
</div>

<!-- RETURN -->
<div class="card" onclick="openPage('return.html')">
<h3>Return</h3>
<div class="stats">
<div class="stat today">Today <span id="return_today">0</span></div>
<div class="stat yesterday">Yesterday <span id="return_yesterday">0</span></div>
<div class="stat total">Total <span id="return_total">0</span></div>
</div>
</div>

<!-- LOOKUP -->
<div class="card" onclick="openPage('lookup.html')">
<h3>Order Lookup</h3>
<div class="stats">
<div class="stat total">Orders <span id="lookup_total">0</span></div>
</div>
</div>

<!-- ✅ RETURN REQUEST FIXED -->
<div class="card" onclick="openPage('return-request.html')">
<h3>Return Request</h3>
<div class="stats">
<div class="stat today">Today <span id="rr_today">0</span></div>
<div class="stat yesterday">Yesterday <span id="rr_yesterday">0</span></div>
<div class="stat total">Total <span id="rr_total">0</span></div>
</div>
</div>

<!-- SETTINGS -->
<div class="card">
<h3>Settings</h3>

<div class="setting-btn" onclick="openCalc()">Calculator</div>
<div class="setting-btn" onclick="toggleMode()" id="modeBtn">Dark Mode</div>
<div class="setting-btn" id="dateTime"></div>
<div class="setting-btn" onclick="exportCSV()">Export Data</div>
<div class="setting-btn" onclick="funny()" id="funBtn">Tik</div>

</div>

</div>

<!-- CALC -->
<div class="popup" id="calcBox">
<input type="text" id="calcInput">
<br><br>
<button onclick="calculate()">=</button>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwcGDOif5DlXDKRuxtsSFV1Rl43E_Yfmiq22_LWn6gIWBtzOSkssef4auS7IR0DyEBV/exec";

function openPage(p){ location.href=p; }

/* ================= LOAD MAIN STATS ================= */
function loadDashboard(){
fetch(API_URL+"?type=stats")
.then(res=>res.json())
.then(d=>{

pickup_today.innerText=d.todayPickup;
pickup_yesterday.innerText=d.yesterdayPickup;
pickup_total.innerText=d.totalPickup;

return_today.innerText=d.todayReturn;
return_yesterday.innerText=d.yesterdayReturn;
return_total.innerText=d.totalReturn;

let total=d.totalPickup+d.totalReturn;
lookup_total.innerText=total;

});
}

/* ================= RETURN REQUEST COUNT ================= */
function loadReturnRequest(){

fetch(API_URL+"?type=exchange")
.then(res=>res.json())
.then(data=>{

let today=0;
let yesterday=0;
let total=data.length;

// ✅ India timezone fix
function getLocalDateStr(d){
return d.toLocaleDateString("en-CA", { timeZone: "Asia/Kolkata" }); 
// format: yyyy-MM-dd
}

let now = new Date();
let yest = new Date();
yest.setDate(now.getDate()-1);

let todayStr = getLocalDateStr(now);
let yestStr = getLocalDateStr(yest);

data.forEach(r=>{

let rowDate = (r.date || "").trim();

if(rowDate === todayStr) today++;
if(rowDate === yestStr) yesterday++;

});

rr_today.innerText = today;
rr_yesterday.innerText = yesterday;
rr_total.innerText = total;

})
.catch(err=>{
console.log("Return Count Error:", err);
});

}

loadDashboard();
loadReturnRequest();

/* CALC */
function openCalc(){ calcBox.style.display="block"; }
window.onclick=e=>{ if(e.target==calcBox) calcBox.style.display="none"; }
function calculate(){ calcInput.value=eval(calcInput.value); }

/* DARK MODE */
function toggleMode(){
document.body.classList.toggle("dark");
modeBtn.innerText=document.body.classList.contains("dark")?"Light Mode":"Dark Mode";
}

/* TIME */
setInterval(()=>{
dateTime.innerText=new Date().toLocaleString("en-IN",{timeZone:"Asia/Kolkata"});
},1000);

/* EXPORT */
function exportCSV(){
fetch(API_URL+"?type=exchange")
.then(res=>res.json())
.then(data=>{
let csv="data\n";
data.forEach(r=>{ csv+=JSON.stringify(r)+"\n"; });
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="data.csv";
a.click();
});
}

/* FUN */
function funny(){
funBtn.innerText = funBtn.innerText==="Tik" ? "Tok" : "Tik";
}

</script>

</body>
</html>
