<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',Arial;
  background:linear-gradient(135deg,#0f2f2f,#0b1f1f);
  color:#fff;
  transition:0.3s;
}

.light{
  background:#f4f6fb;
  color:#000;
}

.header{
  height:70px;
  display:flex;
  align-items:center;
  padding-left:30px;
  font-size:20px;
  font-weight:600;
}

.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:30px;
}

.card{
  background:#2ec48d;
  color:#0b1f1f;
  border-radius:20px;
  padding:20px;
  min-height:180px;
  position:relative;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{ transform:translateY(-6px); }

.card::after{
  content:"+";
  position:absolute;
  top:12px;
  right:15px;
  font-size:20px;
}

.card h3{ margin-top:20px; }

.stats{ margin-top:10px; font-size:14px; }

.stat{ margin-top:5px; }

.stat span{ font-weight:bold; }

.center-card{
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:18px;
}

.light .card{
  background:#fff;
  color:#000;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">Harsidhi Ventures</div>

<div class="dashboard">

<!-- PICKUP -->
<div class="card" onclick="openPage('pickup.html')">
<h3>Pickup</h3>
<div class="stats">
<div class="stat">Today: <span id="pickup_today">0</span></div>
<div class="stat">Yesterday: <span id="pickup_yesterday">0</span></div>
<div class="stat">Total: <span id="pickup_total">0</span></div>
</div>
</div>

<!-- RETURN -->
<div class="card" onclick="openPage('return.html')">
<h3>Return</h3>
<div class="stats">
<div class="stat">Today: <span id="return_today">0</span></div>
<div class="stat">Yesterday: <span id="return_yesterday">0</span></div>
<div class="stat">Total: <span id="return_total">0</span></div>
</div>
</div>

<!-- CUSTOMER CUTTING -->
<div class="card">
<h3>Customer Cutting</h3>
<div class="stats">
<div class="stat">Today: <span id="cutting_today">0</span></div>
<div class="stat">Yesterday: <span id="cutting_yesterday">0</span></div>
<div class="stat">Total: <span id="cutting_total">0</span></div>
</div>
</div>

<!-- FURNISHED -->
<div class="card">
<h3>Furnished</h3>
<div class="stats">
<div class="stat">Today: <span id="furnished_today">0</span></div>
<div class="stat">Yesterday: <span id="furnished_yesterday">0</span></div>
<div class="stat">Total: <span id="furnished_total">0</span></div>
</div>
</div>

<!-- SEARCH -->
<div class="card" onclick="openPage('lookup.html')">
<h3>Search</h3>
<div class="stats">
<div class="stat">Orders: <span id="lookup_total">0</span></div>
</div>
</div>

<!-- RETURN REQUEST -->
<div class="card" onclick="openPage('return-request.html')">
<h3>Return Request</h3>
<div class="stats">
<div class="stat">Today: <span id="rr_today">0</span></div>
<div class="stat">Yesterday: <span id="rr_yesterday">0</span></div>
<div class="stat">Total: <span id="rr_total">0</span></div>
</div>
</div>

<!-- DATE -->
<div class="card center-card" id="dateTimeCard">Loading...</div>

<!-- MODE -->
<div class="card center-card" onclick="toggleMode()" id="modeCard">Light Mode</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwcGDOif5DlXDKRuxtsSFV1Rl43E_Yfmiq22_LWn6gIWBtzOSkssef4auS7IR0DyEBV/exec";

function openPage(p){ location.href=p; }

/* DASHBOARD */
function loadDashboard(){
fetch(API_URL+"?type=stats")
.then(res=>res.json())
.then(d=>{

// PICKUP
pickup_today.innerText=d.todayPickup||0;
pickup_yesterday.innerText=d.yesterdayPickup||0;
pickup_total.innerText=d.totalPickup||0;

// RETURN
return_today.innerText=d.todayReturn||0;
return_yesterday.innerText=d.yesterdayReturn||0;
return_total.innerText=d.totalReturn||0;

// CUSTOMER CUTTING
cutting_today.innerText=d.todayCutting||0;
cutting_yesterday.innerText=d.yesterdayCutting||0;
cutting_total.innerText=d.totalCutting||0;

// FURNISHED
furnished_today.innerText=d.todayFurnished||0;
furnished_yesterday.innerText=d.yesterdayFurnished||0;
furnished_total.innerText=d.totalFurnished||0;

// SEARCH TOTAL
lookup_total.innerText=
(d.totalPickup||0)+
(d.totalReturn||0)+
(d.totalCutting||0)+
(d.totalFurnished||0);

});
}

/* RETURN REQUEST */
function loadReturnRequest(){
fetch(API_URL+"?type=exchange")
.then(res=>res.json())
.then(data=>{

let today=0,yesterday=0,total=data.length;

function getDate(d){
return d.toLocaleDateString("en-CA",{timeZone:"Asia/Kolkata"});
}

let now=new Date();
let yest=new Date(); yest.setDate(now.getDate()-1);

let t1=getDate(now);
let t2=getDate(yest);

data.forEach(r=>{
let d=(r.date||"").trim();
if(d===t1) today++;
if(d===t2) yesterday++;
});

rr_today.innerText=today;
rr_yesterday.innerText=yesterday;
rr_total.innerText=total;

});
}

/* LOAD */
function loadAll(){
loadDashboard();
loadReturnRequest();
}
loadAll();
setInterval(loadAll,5000);

/* DATE */
setInterval(()=>{
dateTimeCard.innerText=new Date().toLocaleString("en-IN",{timeZone:"Asia/Kolkata"});
},1000);

/* MODE */
function toggleMode(){
document.body.classList.toggle("light");

modeCard.innerText =
document.body.classList.contains("light")
? "Dark Mode"
: "Light Mode";
}

</script>

</body>
</html>
