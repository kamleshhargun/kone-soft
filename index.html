<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KONE-SOFT</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/kamleshhargun/kone-soft/main/logo.png">
<style>
body {
  font-family:'Segoe UI', Arial;
  margin:0;
  background:#f4f6fb;
  text-align:center;
  transition:0.3s;
}
.dark { background:#0f172a; color:#fff; }

/* HEADER */
.header {
  background:#2d3e50;
  color:#fff;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
.header span { font-size:26px; font-weight:bold; }
.logo { position:absolute; left:20px; width:120px; cursor:pointer; }

/* ANNOUNCEMENT */
.announcement-bar {
  width:100%;
  background: linear-gradient(90deg,#2d3e50,#4f46e5);
  color:#fff;
  padding:10px 0;
  overflow:hidden;
}
.announcement-text {
  display:inline-block;
  white-space:nowrap;
  animation: scrollText 15s linear infinite;
}
@keyframes scrollText {
  0% { transform:translateX(100%); }
  100% { transform:translateX(-100%); }
}

/* DASHBOARD */
.dashboard {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  padding:30px;
}

.card {
  width:250px;
  min-height:250px;
  background:#fff;
  border-radius:15px;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
  padding:15px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.dark .card { background:#1e293b; }

.stats { display:flex; flex-direction:column; gap:10px; }
.stat { background:#f1f3f9; padding:10px; border-radius:8px; }
.dark .stat { background:#334155; }

.stat span { display:block; font-weight:bold; font-size:18px; }

.today { border-left:5px solid #4CAF50; }
.yesterday { border-left:5px solid #FF9800; }
.total { border-left:5px solid #2196F3; }

/* SETTINGS */
.setting-btn {
  background:#2d3e50;
  color:white;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  cursor:pointer;
}

/* CALCULATOR */
.calc-container {
  display:none;
  position:fixed;
  bottom:20px;
  right:20px;
  width:260px;
  background:#1e293b;
  border-radius:15px;
  padding:15px;
}
.calc-display {
  width:100%;
  height:50px;
  margin-bottom:10px;
  text-align:right;
  font-size:20px;
}
.calc-buttons {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}
.calc-buttons button {
  padding:10px;
}

/* DATE TIME */
.datetime-box {
  background:#111827;
  color:#fff;
  padding:10px;
  border-radius:10px;
  font-size:14px;
}

</style>
</head>

<body>

<div class="header">
  <img src="https://raw.githubusercontent.com/kamleshhargun/kone-soft/main/logo.png" class="logo" onclick="location.reload()">
  <span>Harsidhi Ventures</span>
</div>

<div class="announcement-bar">
  <div class="announcement-text" id="announcementText">Loading...</div>
</div>

<div class="dashboard">

<!-- PICKUP -->
<div class="card" onclick="openPage('pickup.html')">
<h3>Pickup</h3>
<div class="stats">
<div class="stat today">Today <span id="pickup_today">0</span></div>
<div class="stat yesterday">Yesterday <span id="pickup_yesterday">0</span></div>
<div class="stat total">Total <span id="pickup_total">0</span></div>
</div>
</div>

<!-- RETURN -->
<div class="card" onclick="openPage('return.html')">
<h3>Return</h3>
<div class="stats">
<div class="stat today">Today <span id="return_today">0</span></div>
<div class="stat yesterday">Yesterday <span id="return_yesterday">0</span></div>
<div class="stat total">Total <span id="return_total">0</span></div>
</div>
</div>

<!-- LOOKUP -->
<div class="card" onclick="openPage('lookup.html')">
<h3>Order Lookup</h3>
<div class="stats">
<div class="stat total">Orders <span id="lookup_total">0</span></div>
</div>
</div>

<!-- RETURN REQUEST -->
<div class="card" onclick="openPage('return-request.html')">
<h3>Return Request</h3>
<div class="stats">
<div class="stat today">Today <span id="rr_today">0</span></div>
<div class="stat yesterday">Yesterday <span id="rr_yesterday">0</span></div>
<div class="stat total">Total <span id="rr_total">0</span></div>
</div>
</div>

<!-- SETTINGS -->
<div class="card">
<h3>Settings</h3>

<div class="setting-btn" onclick="toggleCalc()">Calculator</div>
<div class="setting-btn" onclick="toggleMode()" id="modeBtn">Dark Mode</div>
<div class="datetime-box" id="dateTime"></div>
<div class="setting-btn" onclick="exportCSV()">Export Data</div>
<div class="setting-btn" onclick="funny()" id="funBtn">Tik</div>

</div>

</div>

<!-- CALCULATOR -->
<div class="calc-container" id="calcBox">
<input type="text" id="calcInput" class="calc-display" disabled>
<div class="calc-buttons">
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">÷</button>
<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">×</button>
<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">-</button>
<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="press('+')">+</button>
<button onclick="clearCalc()" style="grid-column:span 4;background:red;color:#fff;">Clear</button>
</div>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwcGDOif5DlXDKRuxtsSFV1Rl43E_Yfmiq22_LWn6gIWBtzOSkssef4auS7IR0DyEBV/exec";

function openPage(p){ location.href=p; }

/* LOAD DASHBOARD */
function loadDashboard(){
fetch(API_URL+"?type=stats")
.then(res=>res.json())
.then(d=>{

pickup_today.innerText=d.todayPickup;
pickup_yesterday.innerText=d.yesterdayPickup;
pickup_total.innerText=d.totalPickup;

return_today.innerText=d.todayReturn;
return_yesterday.innerText=d.yesterdayReturn;
return_total.innerText=d.totalReturn;

lookup_total.innerText = d.totalPickup + d.totalReturn;

/* ANNOUNCEMENT */
announcementText.innerText =
`🚚 Pickup: ${d.todayPickup} | ${d.yesterdayPickup} | ${d.totalPickup}   🔁 Return: ${d.todayReturn} | ${d.yesterdayReturn} | ${d.totalReturn}`;

});
}
/* ORDER LOOKUP */
function loadOrderLookup(){

fetch(API_URL)
.then(res=>res.text())
.then(text=>{

  let data = JSON.parse(text);

  // ✅ total orders count
  let totalOrders = data.length;

  document.getElementById("lookup_total").innerText = totalOrders;

})
.catch(err=>{
  console.error(err);
});
}
/* RETURN REQUEST */
function loadReturnRequest(){

fetch(API_URL)
.then(res=>res.text())
.then(text=>{

  let data = JSON.parse(text);

  let today = 0;
  let yesterday = 0;
  let total = data.length;

  let now = new Date();
  let yest = new Date();
  yest.setDate(now.getDate() - 1);

  // ✅ format: YYYY-MM-DD
  let todayStr = now.toISOString().split("T")[0];
  let yestStr = yest.toISOString().split("T")[0];

  data.forEach(r=>{

    if(!r.date) return;

    let rowDate = new Date(r.date).toISOString().split("T")[0];

    if(rowDate === todayStr) today++;
    if(rowDate === yestStr) yesterday++;

  });

  // ✅ set values
  document.getElementById("rr_today").innerText = today;
  document.getElementById("rr_yesterday").innerText = yesterday;
  document.getElementById("rr_total").innerText = total;

})
.catch(err=>{
  console.error(err);
});
}

loadDashboard();
loadReturnRequest();

/* CALC */
function toggleCalc(){
calcBox.style.display = calcBox.style.display==="block"?"none":"block";
}
function press(v){ calcInput.value+=v; }
function calculate(){ calcInput.value=eval(calcInput.value); }
function clearCalc(){ calcInput.value=""; }

/* DARK MODE */
function toggleMode(){
document.body.classList.toggle("dark");
modeBtn.innerText=document.body.classList.contains("dark")?"Light Mode":"Dark Mode";
}

/* TIME */
setInterval(()=>{
dateTime.innerHTML =
`📅 ${new Date().toLocaleDateString("en-IN")} <br> ⏰ ${new Date().toLocaleTimeString("en-IN")}`;
},1000);

/* EXPORT */
function exportCSV(){
fetch(API_URL+"?type=exchange")
.then(res=>res.json())
.then(data=>{
let csv="data\n";
data.forEach(r=>{ csv+=JSON.stringify(r)+"\n"; });
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="data.csv";
a.click();
});
}

/* FUN */
function funny(){
funBtn.innerText = funBtn.innerText==="Tik" ? "Tok" : "Tik";
}

</script>

</body>
</html>
