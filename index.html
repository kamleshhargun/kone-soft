<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
}

/* HEADER */
.header{
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.header span{
  font-size:26px;
  font-weight:bold;
}

.logo{
  position:absolute;
  left:20px;
  width:110px;
  cursor:pointer;
}

/* DASHBOARD GRID */
.dashboard{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  padding:30px;
}

/* CARD */
.card{
  width:260px;
  min-height:260px;
  border-radius:18px;
  padding:18px;
  cursor:pointer;

  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);

  border:1px solid rgba(255,255,255,0.1);

  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px) scale(1.03);
  background:rgba(255,255,255,0.08);
}

.card h3{
  margin-bottom:15px;
}

/* STATS */
.stats{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.stat{
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
}

.stat span{
  display:block;
  font-size:20px;
  font-weight:bold;
}

.today{border-left:5px solid #4CAF50;}
.yesterday{border-left:5px solid #FF9800;}
.total{border-left:5px solid #2196F3;}

/* SETTINGS BUTTON */
.setting-btn{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  cursor:pointer;
  transition:0.3s;
}

.setting-btn:hover{
  background:#3b82f6;
}

/* POPUP CALC */
.popup{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  text-align:center;
}

.popup input{
  width:200px;
  padding:10px;
  border:none;
  border-radius:8px;
  outline:none;
}

.popup button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:#fff;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
  <img src="https://raw.githubusercontent.com/kamleshhargun/kone-soft/main/logo.png" class="logo" onclick="location.reload()">
  <span>Harsidhi Ventures</span>
</div>

<div class="dashboard">

<!-- PICKUP -->
<div class="card" onclick="openPage('pickup.html')">
<h3>Pickup</h3>
<div class="stats">
<div class="stat today">Today <span id="pickup_today">0</span></div>
<div class="stat yesterday">Yesterday <span id="pickup_yesterday">0</span></div>
<div class="stat total">Total <span id="pickup_total">0</span></div>
</div>
</div>

<!-- RETURN -->
<div class="card" onclick="openPage('return.html')">
<h3>Return</h3>
<div class="stats">
<div class="stat today">Today <span id="return_today">0</span></div>
<div class="stat yesterday">Yesterday <span id="return_yesterday">0</span></div>
<div class="stat total">Total <span id="return_total">0</span></div>
</div>
</div>

<!-- SEARCH -->
<div class="card" onclick="openPage('lookup.html')">
<h3>Search</h3>
<div class="stats">
<div class="stat total">Orders <span id="lookup_total">0</span></div>
</div>
</div>

<!-- RETURN REQUEST -->
<div class="card" onclick="openPage('return-request.html')">
<h3>Return Request</h3>
<div class="stats">
<div class="stat today">Today <span id="rr_today">0</span></div>
<div class="stat yesterday">Yesterday <span id="rr_yesterday">0</span></div>
<div class="stat total">Total <span id="rr_total">0</span></div>
</div>
</div>

<!-- SETTINGS -->
<div class="card">
<h3>Settings</h3>

<div class="setting-btn" onclick="openCalc()">Calculator</div>
<div class="setting-btn" id="dateTime"></div>
<div class="setting-btn" onclick="exportCSV()">Export Data</div>
<div class="setting-btn" onclick="funny()" id="funBtn">Tik</div>

</div>

</div>

<!-- CALCULATOR -->
<div class="popup" id="calcBox">
<input type="text" id="calcInput" placeholder="Enter value">
<br>
<button onclick="calculate()">=</button>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwcGDOif5DlXDKRuxtsSFV1Rl43E_Yfmiq22_LWn6gIWBtzOSkssef4auS7IR0DyEBV/exec";

function openPage(p){ location.href=p; }

/* DASHBOARD */
function loadDashboard(){
fetch(API_URL+"?type=stats")
.then(res=>res.json())
.then(d=>{
pickup_today.innerText=d.todayPickup||0;
pickup_yesterday.innerText=d.yesterdayPickup||0;
pickup_total.innerText=d.totalPickup||0;

return_today.innerText=d.todayReturn||0;
return_yesterday.innerText=d.yesterdayReturn||0;
return_total.innerText=d.totalReturn||0;

lookup_total.innerText=(d.totalPickup||0)+(d.totalReturn||0);
});
}

/* RETURN REQUEST */
function loadReturnRequest(){
fetch(API_URL+"?type=exchange")
.then(res=>res.json())
.then(data=>{
let today=0,yesterday=0,total=data.length;

function getDate(d){
return d.toLocaleDateString("en-CA",{timeZone:"Asia/Kolkata"});
}

let now=new Date();
let yest=new Date(); yest.setDate(now.getDate()-1);

let t1=getDate(now);
let t2=getDate(yest);

data.forEach(r=>{
let d=(r.date||"").trim();
if(d===t1) today++;
if(d===t2) yesterday++;
});

rr_today.innerText=today;
rr_yesterday.innerText=yesterday;
rr_total.innerText=total;

});
}

/* AUTO LOAD */
function loadAll(){
loadDashboard();
loadReturnRequest();
}
loadAll();
setInterval(loadAll,5000);

/* CALCULATOR */
function openCalc(){ calcBox.style.display="block"; }
window.onclick=e=>{ if(e.target==calcBox) calcBox.style.display="none"; }
function calculate(){
try{ calcInput.value=eval(calcInput.value); }
catch{ calcInput.value="Error"; }
}

/* TIME */
setInterval(()=>{
dateTime.innerText=new Date().toLocaleString("en-IN",{timeZone:"Asia/Kolkata"});
},1000);

/* EXPORT */
function exportCSV(){
fetch(API_URL+"?type=exchange")
.then(res=>res.json())
.then(data=>{
let csv="data\n";
data.forEach(r=>{ csv+=JSON.stringify(r)+"\n"; });

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="data.csv";
a.click();
});
}

/* FUN */
function funny(){
funBtn.innerText = funBtn.innerText==="Tik" ? "Tok" : "Tik";
}

</script>

</body>
</html>
